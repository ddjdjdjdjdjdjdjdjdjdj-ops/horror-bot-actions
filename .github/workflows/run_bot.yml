name: Generate Horror Audio

on:
  push:
    paths:
      - 'script.txt'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt

    - name: Run Script and Send Audio
      run: |
        python app.py
        
